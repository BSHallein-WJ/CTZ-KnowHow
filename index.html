<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <title>TechZeichner Pro - Lern-App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">

        <!-- Main Content -->
        <main id="main-content" class="content-area">
            <!-- Content will be rendered here via JS -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="glass-nav">
            <button class="nav-btn active" data-target="home">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            <button class="nav-btn" data-target="learning-home">
                <i class="fas fa-graduation-cap"></i>
                <span>Lernen</span>
            </button>
            <button class="nav-btn" data-target="quiz-home">
                <i class="fas fa-question-circle"></i>
                <span>Quiz</span>
            </button>
        </nav>

        <!-- Global Learning Actions (Fixed at bottom) -->
        <div id="global-learning-actions" class="learning-actions" style="display: none;">
            <button id="btn-show-solution" class="btn-primary" onclick="app.showSolution()">
                <i class="fas fa-eye"></i> Lösung anzeigen
            </button>
            <button id="btn-next-learning" class="btn-primary" style="display: none;" onclick="app.nextQuestion()">
                Nächste Frage <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- View Templates -->
    <template id="tpl-home">
        <div class="view home-view fade-in">
            <div class="welcome-card glass-card">
                <h1>Willkommen bei <span class="accent-text">TechZeichner</span> app</h1>
                <p>Wähle einen Modus, um zu beginnen.</p>
            </div>

            <div class="gateway-grid">
                <div class="gateway-card glass-card learning-card" onclick="app.navigateTo('learning-home')">
                    <div class="module-icon"><i class="fas fa-graduation-cap"></i></div>
                    <div class="gateway-info">
                        <h3>Lernen 🎓</h3>
                        <p>Fragen im Karteikarten-Stil durchgehen.</p>
                    </div>
                    <i class="fas fa-chevron-right"></i>
                </div>

                <div class="gateway-card glass-card quiz-card" onclick="app.navigateTo('quiz-home')">
                    <div class="module-icon"><i class="fas fa-question-circle"></i></div>
                    <div class="gateway-info">
                        <h3>Quiz 🧩</h3>
                        <p>Wissen testen mit Punkten & Feedback.</p>
                    </div>
                    <i class="fas fa-chevron-right"></i>
                </div>

                <div class="gateway-card glass-card exam-card" onclick="app.startExam()">
                    <div class="module-icon"><i class="fas fa-user-graduate"></i></div>
                    <div class="gateway-info">
                        <h3>Prüfungssimulation 🖋️</h3>
                        <p>20 Fragen | 8 Minuten | Ohne Hilfe.</p>
                    </div>
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-quiz-home">
        <div class="view quiz-home-view fade-in">
            <div class="welcome-card glass-card">
                <h2>Quiz-Modus 🧩</h2>
                <p>Wähle ein Thema, um dein Wissen zu testen. Für jede richtige Antwort sammelst du Punkte!</p>
            </div>

            <div class="section-title">
                <h3>Thema wählen</h3>
            </div>

            <div class="modules-grid">
                <div class="module-card glass-card" onclick="app.startQuiz('Blattformate')">
                    <div class="module-icon"><i class="fas fa-file-alt"></i></div>
                    <h3>Blattformate</h3>
                    <p>Wissen testen</p>
                </div>
                <div class="module-card glass-card" onclick="app.startQuiz('Linienarten')">
                    <div class="module-icon"><i class="fas fa-pen-nib"></i></div>
                    <h3>Linienarten</h3>
                    <p>Wissen testen</p>
                </div>
                <div class="module-card glass-card" onclick="app.startQuiz('Maßstäbe')">
                    <div class="module-icon"><i class="fas fa-ruler-combined"></i></div>
                    <h3>Maßstäbe</h3>
                    <p>Wissen testen</p>
                </div>
                <div class="module-card glass-card" onclick="app.startQuiz('Bemaßung')">
                    <div class="module-icon"><i class="fas fa-arrows-alt-h"></i></div>
                    <h3>Bemaßung</h3>
                    <p>Wissen testen</p>
                </div>
                <div class="module-card glass-card" onclick="app.startQuiz('Projektionen')">
                    <div class="module-icon"><i class="fas fa-cube"></i></div>
                    <h3>Projektionen</h3>
                    <p>Wissen testen</p>
                </div>
                <div class="module-card glass-card all-topics-card" onclick="app.startQuiz('all')">
                    <div class="module-icon"><i class="fas fa-random"></i></div>
                    <h3>Alle Themen</h3>
                    <p>Gemischt testen</p>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-quiz-session">
        <div class="view quiz-view" id="quiz-view-container">
            <div class="quiz-header">
                <h2 id="quiz-title">Wissens-Quiz</h2>
                <div class="score-badge">
                    <i class="fas fa-star" id="score-icon"></i>
                    <span id="quiz-score">0</span>
                </div>
            </div>

            <div class="quiz-progress-bar">
                <div id="quiz-progress-fill" class="quiz-progress-bar-fill"></div>
            </div>

            <div id="quiz-container" class="glass-card">
                <!-- Question content injected here -->
            </div>
            <!-- Timer für Prüfung -->
            <div id="exam-timer-container" class="glass-card timer-card" style="display: none;">
                <i class="fas fa-clock"></i>
                <span id="exam-timer">8:00</span>
            </div>
        </div>
    </template>




    <template id="tpl-learning-home">
        <div class="view learning-home-view fade-in">
            <div class="welcome-card glass-card">
                <h2>Lern-Modus 🎓</h2>
                <p>Wähle ein Thema, um die Fragen im Karteikarten-Prinzip durchzugehen. Ohne Stress, ohne Zeitdruck.</p>
            </div>

            <div class="section-title">
                <h3>Thema zum Lernen</h3>
            </div>

            <div class="modules-grid" id="learning-theme-grid">
                <div class="module-card glass-card" onclick="app.startLearning('Blattformate')">
                    <div class="module-icon"><i class="fas fa-file-alt"></i></div>
                    <h3>Blattformate</h3>
                    <p>Lernen</p>
                </div>
                <div class="module-card glass-card" onclick="app.startLearning('Linienarten')">
                    <div class="module-icon"><i class="fas fa-pen-nib"></i></div>
                    <h3>Linienarten</h3>
                    <p>Lernen</p>
                </div>
                <div class="module-card glass-card" onclick="app.startLearning('Maßstäbe')">
                    <div class="module-icon"><i class="fas fa-ruler-combined"></i></div>
                    <h3>Maßstäbe</h3>
                    <p>Lernen</p>
                </div>
                <div class="module-card glass-card" onclick="app.startLearning('Bemaßung')">
                    <div class="module-icon"><i class="fas fa-arrows-alt-h"></i></div>
                    <h3>Bemaßung</h3>
                    <p>Lernen</p>
                </div>
                <div class="module-card glass-card" onclick="app.startLearning('Projektionen')">
                    <div class="module-icon"><i class="fas fa-cube"></i></div>
                    <h3>Projektionen</h3>
                    <p>Lernen</p>
                </div>
                <div class="module-card glass-card all-topics-card" onclick="app.startLearning('all')">
                    <div class="module-icon"><i class="fas fa-random"></i></div>
                    <h3>Alle Themen</h3>
                    <p>Gemischt lernen</p>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-learning-session">
        <div class="view learning-view fade-in">
            <div class="quiz-header">
                <h2 id="learning-title">Lernmodus</h2>
                <span id="learning-progress" class="score-badge">Frage 1/X</span>
            </div>

            <div class="quiz-progress-bar">
                <div id="learning-progress-fill" class="quiz-progress-bar-fill"></div>
            </div>

            <div id="learning-container" class="glass-card">
                <!-- Question content injected here -->
            </div>
        </div>
    </template>

    <!-- Data and App Scripts -->
    <script src="questions_tz.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js');
            });
        }
    </script>
</body>

</html>
